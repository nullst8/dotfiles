
monitor=,preferred,auto,1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = kitty -e env EDITOR=nvim VISUAL=nvim yazi
$fileManagerG = pcmanfm
$menu = rofi -show run -font "JetBrains Mono Nerd Font 12"
$browser = zen-browser
$power = power-menu.sh
$ss = hyprshot -m output
$ssr = hyprshot --clipboard -m region

#################
### AUTOSTART ###
#################

exec-once = waybar &
exec-once = blueman-applet &
exec-once = dunst
exec-once = nm-applet
exec-once = /home/nullst8/.scripts/setrandwall
exec-once = swww-daemon
exec-once = sleep 1 && swww img /home/nullst8/.dotfiles/.wallpaper.jpg --transition-type fade --transition-duration 0.5
exec-once = i3-battery-popup -L20


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GTK_ICON_THEME,Tela-black
env = QT_QPA_PLATFORMTHEME,qt5ct
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct


#####################
### LOOK AND FEEL ###
#####################

general { 
    gaps_in = 4
    gaps_out = 4

    border_size = 0

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    #col.active_border = rgba(ffffffff) rgba(00ff99ee) 45deg
    col.active_border = rgba(ffffffff)
    #col.inactive_border = rgba(000000aa)

    resize_on_border = false 

    allow_tearing = false

    layout = master
}

cursor {
    no_hardware_cursors = true
}

# https://wiki.hyprland.org/Con0figuring/Variables/#decoration
decoration {
    rounding = 6

    # Change transparency of focused and unfocused windows
    active_opacity = 0.85
    # active_opacity = 1.0
    inactive_opacity = 0.9
    # inactive_opacity = 1.0

    dim_inactive = true

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 4
        passes = 2
    }

    shadow:enabled = false
}

animations {
    enabled = false
}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

binds {
  allow_workspace_cycles = true
}

master {
    mfact = 0.5
    new_status = slave
}

misc { 
    force_default_wallpaper = 1 
    disable_hyprland_logo = true 
    enable_swallow = true
    swallow_regex = ^(Alacritty|kitty|footclient)$
    vfr = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

render {
  direct_scanout = false
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    accel_profile = flat
    left_handed = true

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

####################
### KEYBINDINGSS ###
####################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, RETURN, exec, $terminal
binde = $mainMod SHIFT, Q, killactive,
bind = $mainMod,F,fullscreen
bind = $mainMod,G,exec, ~/.config/hypr/scripts/toggle_grayscale.sh
bind = , Print, exec, grim ~/ss/Screenshot-$(date +'%Y-%m-%d-%H%M%S').png
bind = $mainMod, Print, exec, grim -g "$(slurp)" ~/ss/Screenshot-$(date +'%Y-%m-%d-%H%M%S').png
bind = SUPER, SEMICOLON, exec, grim ~/ss/Screenshot-$(date +'%Y-%m-%d-%H%M%S').png
bind = SUPER+SHIFT, SEMICOLON, exec, $ssr
bind = $mainMod SHIFT, C, exit,
bind = $mainMod, E, exec, $fileManagerG
bind = $mainMod SHIFT, E, exec, $fileManager
bind = $mainMod SHIFT, P, exec, $power
bind = $mainMod, W, exec, $browser
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

bind = $mainMod, Tab, workspace, previous

# Move focus with mainMod + arrow keys
binde = $mainMod, H, resizeactive, -15 0
binde = $mainMod, L, resizeactive, 15 0
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = ,XF86MonBrightnessUp, exec, brightnessctl set 3%+
bind = ,XF86MonBrightnessDown, exec, brightnessctl set 3%-
bind = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 3%+
binde = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-
bindl=, XF86AudioPlay, exec, playerctl play-pause # the stupid key is called play , but it toggles 
bindl=, XF86AudioNext, exec, playerctl next 
bindl=, XF86AudioPrev, exec, playerctl previous

binde = $mainMod, UP, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 3%+
binde = $mainMod, DOWN, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-

bind = $mainMod, SPACE, exec, dunstctl close
bind = $mainMod SHIFT, SPACE, exec, dunstctl history-pop

##############################
### WINDOWS AND WORKSPACES ###
##############################

# windowrule = opacity 1 override, match:class ^(librewolf)$
# windowrule = opacity 1 override, match:class ^(code)$
# windowrule = opacity 1 override, match:class ^(discord)$
# windowrule = opacity 1 override, match:class ^(firefox)$
windowrule = opacity 1 override, match:class ^(steam_proton)$
windowrule = opacity 1 override, match:class ^(virt-manager)$
windowrule = opacity 1 override, match:class ^(burp-StartBurp)$
windowrule = opacity 1 override, match:class ^(gimp)$
windowrule = opacity 1 override, match:class ^(DBeaver)$
# windowrule = opacity 1 override, match:class ^(zen)$
windowrule = opacity 1 override, match:class ^(obsidian)$
windowrule = opacity 1 override, match:class ^(org.wireshark.Wireshark)$
windowrule = opacity 1 override, match:class ^(libreoffice-.*)$
windowrule = opacity 1 override, match:class ^(org.gnome.Evince)$
windowrule = opacity 0 override, match:class ^(xwaylandvideobridge)$

windowrule = match:class ^(xwaylandvideobridge)$, no_blur on
windowrule = match:class ^(xwaylandvideobridge)$, no_anim on
windowrule = match:class ^(xwaylandvideobridge)$, no_focus on
windowrule = match:class ^(xwaylandvideobridge)$, max_size 1 1
windowrule = match:class ^(xwaylandvideobridge)$, no_initial_focus on

windowrule = workspace 2, match:class ^(zen)$
